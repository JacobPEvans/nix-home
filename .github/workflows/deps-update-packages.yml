# Automated custom package updates with verified commits
#
# Uses JacobPEvans-github-actions App for:
# - Signed & verified commits via GitHub's REST API
# - Triggering downstream workflows (CI Gate, Review)
#
# Updates:
# - git-flow-next: Go module (via nix-update, handles version + vendorHash)
# - grip: PyPI Python package (via nix-update)
#
# Triggers:
# - Weekly Monday at 8am UTC (schedule)
# - Manual (workflow_dispatch)
name: Update Custom Packages

on:
  schedule:
    - cron: "0 8 * * 1"  # Weekly Monday 8am UTC
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-git-flow-next:
    name: Update git-flow-next
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Update git-flow-next
        run: nix run nixpkgs#nix-update -- --flake git-flow-next

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          sign-commits: true
          branch: chore/update-git-flow-next
          delete-branch: true
          commit-message: |
            chore(deps): update git-flow-next to latest version

            Automated update via nix-update.
          title: "chore(deps): update git-flow-next"
          body: |
            Automated git-flow-next version update via nix-update.

            nix-update automatically fetches the latest release from GitHub
            and updates the version, hash, and vendorHash in
            `modules/common/git-flow-next.nix`.

            ---
            *Created by JacobPEvans-github-actions*
          labels: dependencies
          assignees: JacobPEvans
          reviewers: JacobPEvans

  update-grip:
    name: Update grip
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Update grip
        run: nix run nixpkgs#nix-update -- --flake grip

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          sign-commits: true
          branch: chore/update-grip
          delete-branch: true
          commit-message: |
            chore(deps): update grip to latest PyPI version

            Automated update via nix-update.
          title: "chore(deps): update grip"
          body: |
            Automated grip version update via nix-update.

            nix-update automatically fetches the latest version from PyPI
            and updates the version and hash in `packages/grip.nix`.

            ---
            *Created by JacobPEvans-github-actions*
          labels: dependencies
          assignees: JacobPEvans
          reviewers: JacobPEvans
